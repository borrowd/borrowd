[mypy]
strict = true
python_version = 3.13
exclude = e2e_tests/
# Prevents generic "# type: ignore" comments; require code like ignore[assignment].
# See https://mypy.readthedocs.io/en/stable/error_code_list2.html#code-ignore-without-code
enable_error_code = ignore-without-code
plugins = mypy_django_plugin.main

[mypy.plugins.django-stubs]
# The plugin introspects real model definitions (FK targets, reverse
# accessors, managers), so model fields need no explicit annotations.
django_settings_module = borrowd.config.dev.django

[mypy-*.migrations.*]
# Django-generated migrations include data functions with framework-typed
# (apps, schema_editor) params that aren't worth annotating by hand.
disallow_untyped_defs = false

[mypy-allauth.*]
ignore_missing_imports = true

[mypy-environ]
# No typing yet; see https://github.com/joke2k/django-environ/issues/365
ignore_missing_imports = true

[mypy-django_filters.*]
ignore_missing_imports = true

[mypy-notifications.*]
ignore_missing_imports = true

[mypy-imagekit.*]
ignore_missing_imports = True

[mypy-ipware.*]
ignore_missing_imports = True
