{% load heroicons %}

<!-- Reusable Page Header Component with Back Button -->
<div class="flex items-center justify-center relative mb-6">
    <a href="{% if back_url %}{{ back_url }}{% else %}javascript:history.back(){% endif %}"
       class="absolute left-0 btn btn-ghost btn-circle">
        {% heroicon_solid "arrow-left" class="size-5" %}
    </a>
    <h4 class="text-2xl font-semibold text-gray-800">
        {{ title }}
    </h4>
</div>
