<button {{ attrs }}
  class="inline-block w-fit text-white font-roboto-slab py-2 px-4 rounded-full    
    {% if danger %}bg-red-600 hover:bg-red-700
    {% else %}bg-borrowd-indigo-600 hover:bg-blue-700
    {% endif %}"
  {% if danger %} onclick="return confirm('Are you sure you want to proceed?');"{% endif %}>
    {{ slot }}
</button>
