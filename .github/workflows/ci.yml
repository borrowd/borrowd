name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_e2e:
        description: "Skip E2E tests"
        type: boolean
        default: true

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Lint, format, type-check, template-lint
    runs-on: ubuntu-latest

    env:
      # The django-stubs mypy plugin imports the settings module (see
      # mypy.ini), which requires a secret key to be present.
      DJANGO_SECRET_KEY: ci-not-a-real-secret

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - run: uv sync --frozen

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      # Runs every hook defined in .pre-commit-config.yaml
      - run: uvx pre-commit run --all-files --show-diff-on-failure

  test:
    name: Django tests (Postgres 17)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: borrowd
          POSTGRES_PASSWORD: borrowd
          POSTGRES_DB: borrowd
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U borrowd"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: borrowd.config.ci.django
      DJANGO_SECRET_KEY: ci-not-a-real-secret
      BORROWD_BETA_ENABLED: "False"
      DB_NAME: borrowd
      DB_USER: borrowd
      DB_PASSWORD: borrowd
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # Mirrors(mostly) .platform.app.yaml -> hooks.build
      - run: uv sync --frozen
      - run: npm ci
      - run: npm run build
      - run: uv run manage.py collectstatic --noinput

      # Mirrors .platform.app.yaml -> hooks.deploy
      - run: uv run manage.py migrate

      # Mirrors .platform.app.yaml -> hooks.post_deploy
      - run: uv run manage.py loaddata items/item_categories

      - run: uv run manage.py test

  e2e:
    name: E2E tests (Playwright/Python)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true
    if: ${{ !inputs.skip_e2e }}
    defaults:
      run:
        working-directory: e2e_tests

    env:
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      E2E_BETA_CODE: ${{ secrets.E2E_BETA_CODE }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      E2E_BORROWER_EMAIL: ${{ secrets.E2E_BORROWER_EMAIL }}
      E2E_BORROWER_PASSWORD: ${{ secrets.E2E_BORROWER_PASSWORD }}
      E2E_LENDER_EMAIL: ${{ secrets.E2E_LENDER_EMAIL }}
      E2E_LENDER_PASSWORD: ${{ secrets.E2E_LENDER_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: e2e_tests/requirements.txt

      - run: pip install -r requirements.txt

      - run: playwright install chromium --with-deps

      - run: pytest --tb=short --durations=0

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: e2e_tests/allure-results/
          retention-days: 1

  deploy-report:
    name: Deploy Allure report to GitHub Pages
    runs-on: ubuntu-latest
    needs: [e2e]
    if: always() && needs.e2e.result != 'skipped'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Allure results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-results
          path: e2e_tests/allure-results

      - name: Get Allure history from gh-pages
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure report with history
        uses: simple-elf/allure-report-action@v1.14
        with:
          allure_results: e2e_tests/allure-results
          gh_pages: gh-pages
          allure_history: allure-history
          keep_reports: 20

      - name: Fix allure-history permissions
        run: sudo chown -R $(id -u):$(id -g) ${{ github.workspace }}/allure-history/ || true

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          force_orphan: true

  comment-pr:
    name: Post Allure report link to PR
    runs-on: ubuntu-latest
    needs: [deploy-report]
    if: always() && needs.deploy-report.result != 'skipped' && github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - name: Post report link to PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          message: |
            ## E2E Test Report
            [View Allure Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)
